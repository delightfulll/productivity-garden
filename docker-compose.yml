# Local smoke test: PostgreSQL is not started here — set DB_* (and JWT_SECRET) via env or uncomment env_file.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      PORT: "8080"
    # env_file:
    #   - ./backend/.env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "8081:8080"
    depends_on:
      - backend
